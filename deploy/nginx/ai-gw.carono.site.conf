# Шлюз ai-dialog по wss. Копировать в /root/docker/nginx/conf.d/ (нужен sudo),
# затем: docker exec nginx nginx -t && docker exec nginx nginx -s reload
#
# Шлюз (Node) слушает на ХОСТЕ WSL (GATEWAY_HOST=0.0.0.0, порт 8787).
# nginx (контейнер) достукивается до хоста по IP default-gateway своей сети — 172.21.0.1.
# Если адрес сети изменится: docker exec nginx sh -c "ip route | grep default".

server {
    listen 80;
    server_name ai-gw.carono.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name ai-gw.carono.site;

    ssl_certificate     /etc/nginx/certs/wildcard.carono.site.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.carono.site.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://172.21.0.1:8787;

        # WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Долгие сессии агента — большие таймауты, без буферизации стрима
        proxy_read_timeout 600;
        proxy_send_timeout 600;
        proxy_buffering off;
    }
}

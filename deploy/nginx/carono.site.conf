server {
    listen 80;
    server_name carono.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name carono.site;

    charset utf-8;
    client_max_body_size 512M;

    ssl_certificate     /etc/nginx/certs/wildcard.carono.site.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.carono.site.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 24h;

    root  "/mnt/p/projects abandoned/carono/carono.ru/web";
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # --- ai-dialog: шлюз виджета (wss://carono.site/ai-gateway) ---
    location /ai-gateway {
        proxy_pass http://172.21.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_send_timeout 600;
        proxy_buffering off;
    }

    location ~ ^/assets/.*\.php$ {
        deny all;
    }

    location ~ \.php$ {
        fastcgi_pass         php84:9000;
        fastcgi_index        index.php;
        include              fastcgi_params;
        fastcgi_param        SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 30;
        try_files            $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}

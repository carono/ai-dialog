# Подключение шлюза ai-dialog как location на основном домене.
# Вставить ВНУТРЬ server { } блока https (listen 443) в carono.site.conf,
# рядом с остальными location. Затем:
#   docker exec nginx nginx -t && docker exec nginx nginx -s reload
#
# Виджет коннектится к wss://carono.site/ai-gateway — отдельный поддомен,
# сертификат и запись в hosts НЕ нужны (carono.site уже резолвится и имеет TLS).
# Шлюз (Node) слушает на хосте 0.0.0.0:8787; nginx достукивается по 172.21.0.1.

location /ai-gateway {
    proxy_pass http://172.21.0.1:8787;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600;
    proxy_send_timeout 600;
    proxy_buffering off;
}

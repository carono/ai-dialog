<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Демо-сайт с AI-виджетом</title>
    <meta name="description" content="Пример подключения виджета ai-dialog на сторонний сайт" />
  </head>
  <body>
    <main style="max-width: 720px; margin: 48px auto; font-family: sans-serif; line-height: 1.6">
      <h1 data-ai-component="DemoHome">Демо-сайт</h1>
      <p data-ai-route="/">
        Это обычная страница «чужого» сайта. Внизу справа — встроенный виджет диалога с AI.
        При отправке вопроса в контекст уходят URL, маршрут, заголовок, видимый текст и подсказки.
      </p>
      <p>
        Подключение — одной строкой <code>&lt;script&gt;</code> с атрибутами
        <code>data-project</code>, <code>data-gateway</code>, <code>data-token</code>.
      </p>
    </main>

    <!--
      Подключение виджета. Путь до widget.js — относительный к собранному пакету.
      Замените data-* под свой проект и адрес шлюза.
    -->
    <script
      src="../../packages/widget/dist/widget.js"
      data-project="demo"
      data-gateway="ws://localhost:8787"
      data-token="demo-secret"
    ></script>
  </body>
</html>
